<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMNK Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="logo-badge">TN</span>
      <span>TMNK Admin</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="members">
        <span class="nav-icon">👥</span> Liikmed
      </button>
      <button class="nav-item" data-tab="projects">
        <span class="nav-icon">📋</span> Projektid
      </button>
      <button class="nav-item" data-tab="gallery">
        <span class="nav-icon">📷</span> Galerii
      </button>
      <button class="nav-item" data-tab="events">
        <span class="nav-icon">📅</span> Sündmused
      </button>
      <button class="nav-item" data-tab="settings">
        <span class="nav-icon">⚙️</span> Seaded
      </button>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" class="nav-item logout">
        <span class="nav-icon">🚪</span> Logi välja
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <header class="topbar">
      <button class="hamburger-admin" id="sidebar-toggle">☰</button>
      <h2 id="page-title">Liikmed</h2>
      <a href="/" target="_blank" class="view-site-btn">Vaata saiti →</a>
    </header>

    <!-- ═══ MEMBERS TAB ═══ -->
    <section class="tab-content active" id="tab-members">
      <div class="tab-header">
        <h3>Kõik liikmed</h3>
        <button class="btn-primary" onclick="openModal('member')">+ Lisa liige</button>
      </div>
      <div class="data-table-wrap">
        <table class="data-table" id="members-table">
          <thead>
            <tr><th>Foto</th><th>Nimi</th><th>Vanus</th><th>Roll</th><th>Nähtav</th><th>Tegevused</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- ═══ PROJECTS TAB ═══ -->
    <section class="tab-content" id="tab-projects">
      <div class="tab-header">
        <h3>Kõik projektid</h3>
        <button class="btn-primary" onclick="openModal('project')">+ Lisa projekt</button>
      </div>
      <div class="data-table-wrap">
        <table class="data-table" id="projects-table">
          <thead>
            <tr><th>Ikoon</th><th>Pealkiri (ET)</th><th>Silt</th><th>Nähtav</th><th>Tegevused</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- ═══ GALLERY TAB ═══ -->
    <section class="tab-content" id="tab-gallery">
      <div class="tab-header">
        <h3>Galerii</h3>
        <button class="btn-primary" onclick="openModal('gallery')">+ Lisa pilt</button>
      </div>
      <div class="data-table-wrap">
        <table class="data-table" id="gallery-table">
          <thead>
            <tr><th>Eelvaade</th><th>Pealkiri (ET)</th><th>Silt</th><th>Nähtav</th><th>Tegevused</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- ═══ EVENTS TAB ═══ -->
    <section class="tab-content" id="tab-events">
      <div class="tab-header">
        <h3>Sündmused</h3>
        <button class="btn-primary" onclick="openModal('event')">+ Lisa sündmus</button>
      </div>
      <div class="data-table-wrap">
        <table class="data-table" id="events-table">
          <thead>
            <tr><th>Kuupäev</th><th>Pealkiri (ET)</th><th>Asukoht</th><th>Nähtav</th><th>Tegevused</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- ═══ SETTINGS TAB ═══ -->
    <section class="tab-content" id="tab-settings">
      <div class="tab-header">
        <h3>Saidi seaded</h3>
      </div>
      <form id="settings-form" class="settings-form"></form>
    </section>
  </main>

  <!-- ═══ MODAL ═══ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Lisa</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="modal-form" class="modal-form" enctype="multipart/form-data">
        <input type="hidden" id="modal-id" />
        <input type="hidden" id="modal-type" />
        <div id="modal-fields"></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Tühista</button>
          <button type="submit" class="btn-primary">Salvesta</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
