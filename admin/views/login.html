<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMNK Admin — Logi sisse</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-badge">TN</span>
      <h1>Admin Panel</h1>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label for="username">Kasutajanimi</label>
        <input type="text" id="username" name="username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Parool</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <p class="error-msg" id="error-msg"></p>
      <button type="submit" class="btn-primary">Logi sisse</button>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      errEl.textContent = '';
      const body = new URLSearchParams(new FormData(e.target));
      try {
        const res = await fetch('/auth/login', { method: 'POST', body, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
        const data = await res.json();
        if (data.success) { window.location.href = data.redirect; }
        else { errEl.textContent = data.error || 'Login failed'; }
      } catch { errEl.textContent = 'Connection error'; }
    });
  </script>
</body>
</html>
