name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin panel
        working-directory: admin
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Prepare deployment
        run: |
          # Copy existing site files
          mkdir -p _site
          # Copy everything except admin/, .git/, .github/, node_modules/
          rsync -a --exclude='admin' --exclude='.git' --exclude='.github' --exclude='node_modules' . _site/
          # Copy admin build output
          mkdir -p _site/admin
          cp -r admin/dist/* _site/admin/
          # Copy 404.html for SPA routing
          cp _site/admin/index.html _site/admin/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
